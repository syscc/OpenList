name: Sync beta branch

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - sync-beta
  schedule:
    - cron: '*/5 * * * *'

concurrency:
  group: ${{ github.workflow }}-beta
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  pull-requests: read

jobs:
  sync:
    name: Regenerate beta branch
    runs-on: ubuntu-latest
    if: github.repository_owner != 'OpenListTeam'
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Regenerate beta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git fetch origin refs/heads/beta:refs/remotes/origin/beta || true

          git checkout -B beta origin/main

          fork_base="origin/main"
          owned_paths_file=".github/fork-owned-paths.txt"
          mapfile -t fork_owned_paths < <(sed -e 's/#.*//' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' "$owned_paths_file" | awk 'NF')

          state_file=".github/beta-state.txt"
          mkdir -p .github
          {
            echo "base=$(git rev-parse origin/main)"
            echo "prs:"
          } > "$state_file"

          configured_prs=""
          if [ -f .github/beta-prs.txt ]; then
            configured_prs="$(sed -e 's/#.*//' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' .github/beta-prs.txt | awk 'NF')"
          fi

          if [ -n "$configured_prs" ]; then
            pr_numbers="$configured_prs"
          else
            pr_numbers="$(gh pr list \
              --repo OpenListTeam/OpenList \
              --author "${{ github.repository_owner }}" \
              --state open \
              --json number,isDraft,headRepositoryOwner \
              --jq '.[] | select(.isDraft == false) | select(.headRepositoryOwner.login == "${{ github.repository_owner }}") | .number')"
          fi

          for pr in $pr_numbers; do
            pr_json="$(gh pr view "$pr" \
              --repo OpenListTeam/OpenList \
              --json state,isDraft,headRepositoryOwner,headRepository,headRefName,headRefOid,url \
              --jq '.')"

            state="$(echo "$pr_json" | jq -r '.state')"
            draft="$(echo "$pr_json" | jq -r '.isDraft')"
            owner="$(echo "$pr_json" | jq -r '.headRepositoryOwner.login')"
            repo="$(echo "$pr_json" | jq -r '.headRepository.name')"
            ref="$(echo "$pr_json" | jq -r '.headRefName')"
            oid="$(echo "$pr_json" | jq -r '.headRefOid')"
            url="$(echo "$pr_json" | jq -r '.url')"

            if [ "$state" != "OPEN" ] || [ "$draft" = "true" ]; then
              echo "skip PR #$pr: state=$state draft=$draft"
              echo "- $pr skipped state=$state draft=$draft" >> "$state_file"
              continue
            fi

            if [ "$owner" != "${{ github.repository_owner }}" ]; then
              echo "skip PR #$pr: owner=$owner"
              echo "- $pr skipped owner=$owner" >> "$state_file"
              continue
            fi

            remote="pr-$pr"
            git remote add "$remote" "https://github.com/$owner/$repo.git"
            git fetch "$remote" "$ref"

            echo "merge PR #$pr: $url"
            merge_failed=0
            git merge --no-edit --no-ff --no-commit FETCH_HEAD || merge_failed=1
            if [ "$merge_failed" -ne 0 ] && ! git rev-parse --verify -q MERGE_HEAD >/dev/null; then
              echo "PR #$pr merge failed before conflict resolution."
              exit 1
            fi

            for path in "${fork_owned_paths[@]}"; do
              git rm -r -f --ignore-unmatch "$path"
              if git cat-file -e "$fork_base:$path" 2>/dev/null; then
                git checkout "$fork_base" -- "$path"
                git add "$path"
              else
                echo "Keep fork deletion for path: $path"
              fi
            done

            remaining_conflicts="$(git diff --name-only --diff-filter=U)"
            if [ -n "$remaining_conflicts" ]; then
              echo "PR #$pr has conflicts outside fork-owned paths:"
              echo "$remaining_conflicts"
              exit 1
            fi

            if git rev-parse --verify -q MERGE_HEAD >/dev/null; then
              git commit --no-edit
            fi
            if [ "$merge_failed" -ne 0 ]; then
              echo "Resolved PR #$pr conflicts with this fork's fixed path versions."
            fi
            echo "- $pr $oid $url" >> "$state_file"
          done

          git add "$state_file"
          if ! git diff --cached --quiet; then
            git commit -m "ci: update beta state"
          fi

          new_tree="$(git rev-parse HEAD^{tree})"
          old_tree=""
          if git rev-parse --verify origin/beta >/dev/null 2>&1; then
            old_tree="$(git rev-parse origin/beta^{tree})"
          fi

          if [ "$new_tree" = "$old_tree" ]; then
            echo "Beta tree is already up to date."
            exit 0
          fi

          git push --force-with-lease origin HEAD:refs/heads/beta

          # Pushes made with GITHUB_TOKEN do not trigger push workflows.
          # Dispatch both beta builds explicitly after beta actually changes.
          gh workflow run test_docker.yml --repo "${{ github.repository }}" --ref beta
          gh workflow run beta_release.yml --repo "${{ github.repository }}" --ref beta
