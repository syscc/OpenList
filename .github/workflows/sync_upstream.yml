name: Sync upstream main

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  sync:
    name: Merge latest official beta base
    runs-on: ubuntu-latest
    if: github.repository_owner != 'OpenListTeam'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Merge latest official beta base
        id: merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/OpenListTeam/OpenList.git
          git fetch upstream main

          official_run="$(gh run list \
            --repo OpenListTeam/OpenList \
            --workflow test_docker.yml \
            --branch main \
            --event push \
            --status success \
            --limit 1 \
            --json databaseId,headSha,url \
            --jq '.[0]')"

          if [ -z "$official_run" ] || [ "$official_run" = "null" ]; then
            echo "No successful official beta Docker run found."
            exit 1
          fi

          official_sha="$(echo "$official_run" | jq -r '.headSha')"
          official_run_id="$(echo "$official_run" | jq -r '.databaseId')"
          official_run_url="$(echo "$official_run" | jq -r '.url')"

          git cat-file -e "${official_sha}^{commit}"
          echo "Latest official beta Docker run: $official_run_id"
          echo "Official beta base SHA: $official_sha"
          echo "Official run URL: $official_run_url"

          before="$(git rev-parse HEAD)"
          if git merge-base --is-ancestor "$official_sha" HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already contains latest official beta base."
            exit 0
          fi

          fork_base="$before"
          owned_paths_file=".github/fork-owned-paths.txt"
          mapfile -t fork_owned_paths < <(sed -e 's/#.*//' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' "$owned_paths_file" | awk 'NF')

          merge_failed=0
          git merge --no-edit --no-ff --no-commit "$official_sha" || merge_failed=1

          for path in "${fork_owned_paths[@]}"; do
            echo "Restore fork-owned path: $path"
            git rm -r -f --ignore-unmatch "$path"
            rm -rf "$path"
            if git cat-file -e "$fork_base:$path" 2>/dev/null; then
              git checkout "$fork_base" -- "$path"
              git add "$path"
            else
              echo "Keep fork deletion for path: $path"
            fi
          done

          remaining_conflicts="$(git diff --name-only --diff-filter=U)"
          if [ -n "$remaining_conflicts" ]; then
            echo "Merge still has conflicts outside fork-owned paths:"
            echo "$remaining_conflicts"
            exit 1
          fi

          if [ "$merge_failed" -ne 0 ]; then
            echo "Merge conflicts were limited to fork-owned paths and have been resolved with this fork's versions."
          fi

          if git diff --quiet && git diff --cached --quiet; then
            git commit --allow-empty -m "ci: merge official beta base ${official_sha:0:8}"
          else
            git commit --no-edit
          fi

          after="$(git rev-parse HEAD)"
          if [ "$before" = "$after" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes after merge."
            exit 0
          fi

          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger beta sync
        if: steps.merge.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            -f event_type=sync-beta
